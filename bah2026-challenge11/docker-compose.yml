version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: bah2026_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: bah2026-challenge11:latest
    container_name: bah2026_api
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - MODEL_CHECKPOINT_PATH=/app/checkpoints/best_model.pt
      - FAISS_INDEX_PATH=/app/faiss_index
      - MODEL_BACKBONE=vit
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./faiss_index:/app/faiss_index:ro
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    container_name: bah2026_nginx
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  nginx_logs:
